version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - DATABASE_URL=postgresql://buddy:buddy_secret@db:5432/buddydb
      - OLLAMA_URL=http://ollama:11434/api/chat
      - SECRET_KEY=prod_secret_key_change_me
    ports:
      - "2520:2520"
    depends_on:
      - db
      - ollama

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: buddy
      POSTGRES_PASSWORD: buddy_secret
      POSTGRES_DB: buddydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  postgres_data:
  ollama_data:
