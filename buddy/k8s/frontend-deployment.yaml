apiVersion: apps/v1
kind: Deployment
metadata:
  name: buddy-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: buddy-frontend
  template:
    metadata:
      labels:
        app: buddy-frontend
    spec:
      containers:
      - name: frontend
        image: buddy-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: buddy-frontend
spec:
  selector:
    app: buddy-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
