apiVersion: apps/v1
kind: Deployment
metadata:
  name: buddy-ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buddy-ollama
  template:
    metadata:
      labels:
        app: buddy-ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
      volumes:
      - name: ollama-storage
        hostPath: 
          path: /data/ollama # Adjust for cloud volume
---
apiVersion: v1
kind: Service
metadata:
  name: buddy-ollama
spec:
  selector:
    app: buddy-ollama
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434
